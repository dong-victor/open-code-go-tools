name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Wails GUI
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            output: ocgt-linux-amd64
          - os: macos-latest
            platform: darwin/amd64
            output: ocgt-darwin-amd64
          - os: macos-latest
            platform: darwin/arm64
            output: ocgt-darwin-arm64
          - os: windows-latest
            platform: windows/amd64
            output: ocgt-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails GUI Binary
        run: wails build -platform ${{ matrix.platform }} -clean -ldflags "-s -w"

      - name: Prepare Unix Asset
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp build/bin/ocgt dist/${{ matrix.output }}

      - name: Prepare Windows Asset
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item -Path build/bin/ocgt.exe -Destination dist/${{ matrix.output }} -Force

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: ocgt ${{ github.ref_name }} GUI
          body: |
            This release publishes the Wails GUI client for ocgt.

            Download the asset for your platform, run it directly, then use the GUI to save your OpenCode Go key, repair Claude Code environment variables, and launch a configured terminal.

            Windows users should normally download `ocgt-windows-amd64.exe`.
          files: |
            dist/*
          generate_release_notes: true
