name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/ocgt-linux-amd64 ./cmd/ocgt
          # linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/ocgt-linux-arm64 ./cmd/ocgt
          # windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/ocgt-windows-amd64.exe ./cmd/ocgt
          # windows arm64
          GOOS=windows GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/ocgt-windows-arm64.exe ./cmd/ocgt
          # darwin amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/ocgt-darwin-amd64 ./cmd/ocgt
          # darwin arm64
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/ocgt-darwin-arm64 ./cmd/ocgt

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
